<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#07111f" />
  <meta name="description" content="MiniAI PWA v7：本機知識庫、大型模型、任務通知、行事曆匯出的私人 AI 助理。" />
  <link rel="manifest" href="./manifest.json" />
  <title>MiniAI PWA v7</title>
  <style>
    :root{
      --bg:#050816;--card:rgba(30,41,59,.95);--soft:rgba(255,255,255,.07);
      --line:rgba(255,255,255,.13);--text:#f8fafc;--muted:#cbd5e1;
      --accent:#38bdf8;--accent2:#a78bfa;--ok:#34d399;--warn:#fbbf24;
      --danger:#fb7185;--shadow:0 24px 80px rgba(0,0,0,.42)
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:
      radial-gradient(circle at top left,rgba(56,189,248,.18),transparent 32rem),
      radial-gradient(circle at 85% 8%,rgba(52,211,153,.10),transparent 24rem),
      radial-gradient(circle at bottom right,rgba(167,139,250,.22),transparent 30rem),var(--bg);
      color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}
    button,textarea,input,select{font-family:inherit}
    .app{width:min(1120px,100%);margin:0 auto;min-height:100vh;display:grid;grid-template-rows:auto 1fr auto}
    header{padding:calc(18px + env(safe-area-inset-top)) 16px 14px;background:rgba(5,8,22,.82);backdrop-filter:blur(18px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
    .topline{display:flex;justify-content:space-between;align-items:center;gap:12px}
    .brand{display:flex;align-items:center;gap:12px;min-width:0}
    .logo{width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;color:#07111f;font-weight:950;box-shadow:0 14px 40px rgba(56,189,248,.25)}
    h1{margin:0;font-size:20px;line-height:1.2}.subtitle{margin:4px 0 0;color:var(--muted);font-size:13px;line-height:1.35}
    .badge{border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--muted);border-radius:999px;padding:7px 10px;font-size:12px;white-space:nowrap}
    .toolbar,.quick-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}.toolbar{padding-top:14px}.toolbar::-webkit-scrollbar,.quick-row::-webkit-scrollbar{display:none}
    button{border:1px solid var(--line);background:var(--soft);color:var(--text);border-radius:14px;padding:10px 12px;cursor:pointer;font-size:14px;white-space:nowrap}
    button.primary{border:0;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#07111f;font-weight:850}
    button.ok{border-color:rgba(52,211,153,.35);background:rgba(52,211,153,.14);color:#bbf7d0}
    button.warn{border-color:rgba(251,191,36,.35);background:rgba(251,191,36,.13);color:#fde68a}
    button.danger{border-color:rgba(251,113,133,.35);background:rgba(251,113,133,.16);color:#fecdd3}
    main{padding:16px;overflow-y:auto}
    .dashboard{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
    .stat{border:1px solid var(--line);background:rgba(255,255,255,.055);border-radius:18px;padding:12px;min-height:74px}
    .stat .label{color:var(--muted);font-size:12px;margin-bottom:4px}.stat .value{font-size:19px;font-weight:850;overflow-wrap:anywhere}
    .mode-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .mode-card{border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.045);padding:12px}
    .mode-card label{display:block;margin-bottom:7px;font-size:12px;color:var(--muted)}
    .quick-row{margin-bottom:14px}
    .chat{display:flex;flex-direction:column;gap:12px;padding-bottom:16px}
    .msg{max-width:92%;padding:12px 14px;border-radius:18px;line-height:1.65;font-size:15px;white-space:pre-wrap;box-shadow:var(--shadow)}
    .msg.user{align-self:flex-end;border-bottom-right-radius:6px;background:linear-gradient(135deg,rgba(56,189,248,.98),rgba(167,139,250,.95));color:#07111f;font-weight:650}
    .msg.ai{align-self:flex-start;border-bottom-left-radius:6px;background:var(--card);border:1px solid var(--line)}
    .msg.system{align-self:center;max-width:96%;background:rgba(255,255,255,.05);border:1px dashed var(--line);color:var(--muted);box-shadow:none;font-size:13px}
    .sources{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;color:var(--muted);font-size:12px}
    .source-pill{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:5px 8px;margin:4px 5px 0 0;background:rgba(255,255,255,.05);max-width:100%;overflow-wrap:anywhere}
    footer{padding:12px 16px calc(14px + env(safe-area-inset-bottom));background:rgba(5,8,22,.84);backdrop-filter:blur(18px);border-top:1px solid var(--line);position:sticky;bottom:0}
    .composer{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end}
    textarea{width:100%;min-height:48px;max-height:190px;resize:vertical;border:1px solid var(--line);border-radius:17px;padding:12px 14px;background:rgba(255,255,255,.07);color:var(--text);outline:none;line-height:1.55;font-size:15px}
    input,select{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(255,255,255,.07);color:var(--text);outline:none;font-size:15px}
    textarea::placeholder,input::placeholder{color:rgba(203,213,225,.72)}.hint{margin-top:8px;color:var(--muted);font-size:12px;line-height:1.45}
    dialog{width:min(960px,calc(100% - 26px));border:1px solid var(--line);border-radius:22px;color:var(--text);background:#101827;box-shadow:var(--shadow);padding:0}
    dialog::backdrop{background:rgba(0,0,0,.58);backdrop-filter:blur(6px)}.modal{padding:18px}.modal h2{margin:0 0 8px;font-size:19px}.modal p,.modal li{color:var(--muted);line-height:1.65;font-size:14px}
    .form-grid{display:grid;gap:10px;margin-top:12px}label{font-size:13px;color:var(--muted)}
    .modal-actions{display:flex;justify-content:flex-end;flex-wrap:wrap;gap:8px;margin-top:14px}
    .list{display:grid;gap:10px;max-height:58vh;overflow:auto;margin-top:12px}
    .item{border:1px solid var(--line);border-radius:16px;padding:12px;background:rgba(255,255,255,.045)}
    .item.done{opacity:.62}.item-head{display:flex;justify-content:space-between;gap:10px;align-items:start;margin-bottom:6px}
    .item-title{font-weight:850;line-height:1.45;overflow-wrap:anywhere}.small{font-size:12px;color:var(--muted)}
    .two-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}.three-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .empty{color:var(--muted);text-align:center;border:1px dashed var(--line);border-radius:16px;padding:24px 14px}
    .tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}.tag{font-size:11px;color:#bae6fd;border:1px solid rgba(56,189,248,.25);background:rgba(56,189,248,.08);padding:3px 7px;border-radius:999px}
    .tag.mode{color:#d8b4fe;border-color:rgba(167,139,250,.28);background:rgba(167,139,250,.10)}.tag.warn{color:#fde68a;border-color:rgba(251,191,36,.28);background:rgba(251,191,36,.10)}.tag.ok{color:#bbf7d0;border-color:rgba(52,211,153,.28);background:rgba(52,211,153,.10)}
    .drop-zone{border:1px dashed rgba(56,189,248,.45);background:rgba(56,189,248,.07);border-radius:18px;padding:18px;text-align:center;color:var(--muted)}
    .drop-zone strong{color:var(--text)}
    @media(max-width:900px){.dashboard{grid-template-columns:1fr 1fr}.dashboard .stat:last-child{grid-column:1 / -1}}
    @media(max-width:760px){.mode-row,.two-cols,.three-cols{grid-template-columns:1fr}.msg{max-width:95%}.logo{width:38px;height:38px}.stat .value{font-size:17px}}
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="topline">
      <div class="brand">
        <div class="logo">AI</div>
        <div>
          <h1>MiniAI PWA v7</h1>
          <p class="subtitle">通知與行事曆版：知識庫、任務、每日整理、ICS 匯出、大型模型。</p>
        </div>
      </div>
      <span class="badge" id="statusBadge">初始化中</span>
    </div>

    <div class="toolbar">
      <button class="primary" id="installBtn" hidden>安裝到手機</button>
      <button id="newChatBtn">新對話</button>
      <button id="briefBtn">每日整理</button>
      <button class="ok" id="taskBtn">任務</button>
      <button id="addTaskBtn">新增任務</button>
      <button class="warn" id="notifyBtn">啟用通知</button>
      <button id="exportIcsBtn">任務匯出行事曆</button>
      <button id="historyBtn">聊天紀錄</button>
      <button id="learnBtn">新增知識</button>
      <button class="ok" id="importDocBtn">匯入文件</button>
      <button id="knowledgeBtn">知識庫</button>
      <button id="exportBtn">匯出全部</button>
      <button id="importBackupBtn">匯入備份</button>
      <button id="settingsBtn">設定</button>
      <button class="danger" id="resetBtn">重置</button>
    </div>
  </header>

  <main>
    <section class="dashboard">
      <div class="stat"><div class="label">知識</div><div class="value" id="statKnowledge">0</div></div>
      <div class="stat"><div class="label">任務</div><div class="value" id="statTasks">0</div></div>
      <div class="stat"><div class="label">今日到期</div><div class="value" id="statDueToday">0</div></div>
      <div class="stat"><div class="label">通知</div><div class="value" id="statNotify">未啟用</div></div>
      <div class="stat"><div class="label">引擎</div><div class="value" id="statEngine">本機</div></div>
    </section>

    <section class="mode-row">
      <div class="mode-card">
        <label>工作模式</label>
        <select id="taskMode">
          <option value="general">一般回答</option>
          <option value="summary">摘要重點</option>
          <option value="todo">轉成待辦</option>
          <option value="study">學習卡片</option>
          <option value="sop">整理成 SOP</option>
          <option value="compare">比較與取捨</option>
          <option value="assistant">私人助理建議</option>
        </select>
      </div>
      <div class="mode-card">
        <label>回答方式</label>
        <select id="answerEngine">
          <option value="hybrid">混合：本機知識 + 大型模型</option>
          <option value="local">只用本機搜尋</option>
        </select>
      </div>
    </section>

    <section class="quick-row">
      <button data-quick="整理我今天要做的事">整理今日任務</button>
      <button data-quick="根據目前任務，幫我排優先順序">任務排序</button>
      <button data-quick="把下面內容整理成 SOP：">SOP 模板</button>
      <button data-quick="幫我把下面內容轉成待辦：">待辦模板</button>
      <button data-quick="幫我摘要下面內容：">摘要模板</button>
    </section>

    <section class="chat" id="chat"></section>
  </main>

  <footer>
    <form class="composer" id="chatForm">
      <textarea id="userInput" placeholder="輸入問題、筆記、任務或待整理內容。"></textarea>
      <button class="primary" type="submit">送出</button>
    </form>
    <div class="hint">通知是本機提醒：App 開著或重新開啟時最穩。行事曆匯出會產生 .ics，可匯入 Google Calendar 等行事曆。</div>
  </footer>
</div>

<dialog id="settingsDialog"><div class="modal">
  <h2>設定</h2>
  <div class="form-grid">
    <label>API URL</label>
    <input id="apiUrl" placeholder="/api/chat" />
    <label>每次送給模型的本機知識片段數</label>
    <select id="contextLimit"><option value="3">3 段，較省</option><option value="5" selected>5 段，推薦</option><option value="8">8 段，較完整</option></select>
    <label>每日整理偏好</label>
    <select id="briefStyle"><option value="compact">簡潔版</option><option value="detailed">詳細版</option><option value="action">行動優先</option></select>
    <label>任務提醒檢查間隔</label>
    <select id="reminderInterval"><option value="15">15 分鐘</option><option value="30" selected>30 分鐘</option><option value="60">60 分鐘</option></select>
  </div>
  <div class="modal-actions"><button id="closeSettingsBtn">取消</button><button class="primary" id="saveSettingsBtn">儲存</button></div>
</div></dialog>

<dialog id="taskDialog"><div class="modal">
  <h2>任務管理</h2>
  <div class="three-cols">
    <input id="taskFilter" placeholder="搜尋任務" />
    <select id="taskStatusFilter"><option value="all">全部</option><option value="open">未完成</option><option value="done">已完成</option></select>
    <select id="taskSort"><option value="due">依到期日</option><option value="newest">最新在前</option><option value="priority">依優先級</option></select>
  </div>
  <p id="taskCount"></p><div class="list" id="taskList"></div>
  <div class="modal-actions"><button id="closeTaskBtn">關閉</button></div>
</div></dialog>

<dialog id="addTaskDialog"><div class="modal">
  <h2>新增任務</h2>
  <div class="form-grid">
    <label>任務內容</label><input id="taskTitle" placeholder="例如：上傳 MiniAI v7 到 GitHub" />
    <label>到期日，可選</label><input id="taskDue" type="date" />
    <label>提醒時間，可選</label><input id="taskReminder" type="datetime-local" />
    <label>優先級</label><select id="taskPriority"><option value="medium">中</option><option value="high">高</option><option value="low">低</option></select>
    <label>分類，可選</label><input id="taskCategory" placeholder="例如：AI, 工作, 學習" />
    <label>備註，可選</label><textarea id="taskNote" placeholder="補充說明"></textarea>
  </div>
  <div class="modal-actions"><button id="cancelTaskBtn">取消</button><button class="primary" id="saveTaskBtn">儲存</button></div>
</div></dialog>

<dialog id="learnDialog"><div class="modal">
  <h2>新增知識</h2>
  <div class="form-grid">
    <label>標題 / 問題</label><input id="learnQuestion" placeholder="例如：我的常用工具是什麼" />
    <label>內容 / 答案</label><textarea id="learnAnswer" placeholder="例如：你常用 ChatGPT 作為主要整理與輸出平台。"></textarea>
    <label>標籤，可選</label><input id="learnTags" placeholder="例如：個人設定, 工具, AI" />
  </div>
  <div class="modal-actions"><button id="cancelLearnBtn">取消</button><button class="primary" id="saveLearnBtn">儲存</button></div>
</div></dialog>

<dialog id="docDialog"><div class="modal">
  <h2>匯入文件</h2>
  <p>支援 TXT、Markdown、JSON。PDF 請先轉成文字再匯入。</p>
  <div class="drop-zone"><strong>選擇文件</strong><p>長文件會自動切成多個本機知識片段。</p><button class="ok" id="chooseDocBtn">選擇 TXT / MD / JSON</button></div>
  <div class="form-grid">
    <label>文件標籤，可選</label><input id="docTags" placeholder="例如：筆記, 工作, 學習" />
    <label>切段大小</label><select id="chunkSize"><option value="500">短段 500 字</option><option value="800" selected>中段 800 字，推薦</option><option value="1200">長段 1200 字</option></select>
  </div>
  <p id="docImportStatus"></p>
  <div class="modal-actions"><button id="closeDocBtn">關閉</button></div>
</div></dialog>

<dialog id="knowledgeDialog"><div class="modal">
  <h2>知識庫</h2>
  <div class="two-cols"><input id="knowledgeFilter" placeholder="搜尋知識" /><select id="sortMode"><option value="newest">最新在前</option><option value="oldest">最舊在前</option><option value="type">依類型排序</option></select></div>
  <p id="knowledgeCount"></p><div class="list" id="knowledgeList"></div>
  <div class="modal-actions"><button id="closeKnowledgeBtn">關閉</button></div>
</div></dialog>

<dialog id="historyDialog"><div class="modal">
  <h2>聊天紀錄</h2>
  <div class="two-cols"><input id="historyFilter" placeholder="搜尋聊天紀錄" /><select id="historySort"><option value="newest">最新在前</option><option value="oldest">最舊在前</option></select></div>
  <p id="historyCount"></p><div class="list" id="historyList"></div>
  <div class="modal-actions"><button id="closeHistoryBtn">關閉</button></div>
</div></dialog>

<input type="file" id="docFile" accept=".txt,.md,.markdown,.json,text/plain,text/markdown,application/json" multiple hidden />
<input type="file" id="backupFile" accept="application/json,.json" hidden />

<script>
const DB_NAME="MiniAI_PWA_v7",DB_VERSION=1,KNOWLEDGE="knowledge",CHATS="chats",TASKS="tasks";
const taskLabels={general:"一般回答",summary:"摘要重點",todo:"轉成待辦",study:"學習卡片",sop:"整理成 SOP",compare:"比較與取捨",assistant:"私人助理建議"};
const priorityLabels={high:"高",medium:"中",low:"低"};
const defaultKnowledge=[
 {type:"qa",title:"你好",content:"你好，我是 MiniAI PWA v7。現在我有本機知識庫、任務管理、通知、行事曆匯出、每日整理，並可橋接大型模型。",tags:["基本"]},
 {type:"qa",title:"什麼是任務通知",content:"任務通知是本機提醒。App 開著或重新開啟時會檢查提醒時間、今日到期與逾期任務。",tags:["通知","任務"]},
 {type:"qa",title:"什麼是行事曆匯出",content:"行事曆匯出會把未完成且有到期日的任務打包成 .ics 檔，可匯入行事曆工具。",tags:["行事曆","任務"]},
 {type:"qa",title:"資料會同步到雲端嗎",content:"不會。本機知識、聊天與任務都存在這台裝置的 IndexedDB。只有混合模式會把你的問題與少數相關片段送到後端模型。",tags:["隱私","安全"]}
];

const el={chat:q("#chat"),chatForm:q("#chatForm"),userInput:q("#userInput"),installBtn:q("#installBtn"),newChatBtn:q("#newChatBtn"),briefBtn:q("#briefBtn"),taskBtn:q("#taskBtn"),addTaskBtn:q("#addTaskBtn"),notifyBtn:q("#notifyBtn"),exportIcsBtn:q("#exportIcsBtn"),historyBtn:q("#historyBtn"),learnBtn:q("#learnBtn"),importDocBtn:q("#importDocBtn"),knowledgeBtn:q("#knowledgeBtn"),exportBtn:q("#exportBtn"),importBackupBtn:q("#importBackupBtn"),settingsBtn:q("#settingsBtn"),resetBtn:q("#resetBtn"),taskMode:q("#taskMode"),answerEngine:q("#answerEngine"),settingsDialog:q("#settingsDialog"),apiUrl:q("#apiUrl"),contextLimit:q("#contextLimit"),briefStyle:q("#briefStyle"),reminderInterval:q("#reminderInterval"),closeSettingsBtn:q("#closeSettingsBtn"),saveSettingsBtn:q("#saveSettingsBtn"),taskDialog:q("#taskDialog"),taskFilter:q("#taskFilter"),taskStatusFilter:q("#taskStatusFilter"),taskSort:q("#taskSort"),taskCount:q("#taskCount"),taskList:q("#taskList"),closeTaskBtn:q("#closeTaskBtn"),addTaskDialog:q("#addTaskDialog"),taskTitle:q("#taskTitle"),taskDue:q("#taskDue"),taskReminder:q("#taskReminder"),taskPriority:q("#taskPriority"),taskCategory:q("#taskCategory"),taskNote:q("#taskNote"),cancelTaskBtn:q("#cancelTaskBtn"),saveTaskBtn:q("#saveTaskBtn"),learnDialog:q("#learnDialog"),learnQuestion:q("#learnQuestion"),learnAnswer:q("#learnAnswer"),learnTags:q("#learnTags"),cancelLearnBtn:q("#cancelLearnBtn"),saveLearnBtn:q("#saveLearnBtn"),docDialog:q("#docDialog"),chooseDocBtn:q("#chooseDocBtn"),docFile:q("#docFile"),docTags:q("#docTags"),chunkSize:q("#chunkSize"),docImportStatus:q("#docImportStatus"),closeDocBtn:q("#closeDocBtn"),knowledgeDialog:q("#knowledgeDialog"),knowledgeFilter:q("#knowledgeFilter"),sortMode:q("#sortMode"),knowledgeCount:q("#knowledgeCount"),knowledgeList:q("#knowledgeList"),closeKnowledgeBtn:q("#closeKnowledgeBtn"),historyDialog:q("#historyDialog"),historyFilter:q("#historyFilter"),historySort:q("#historySort"),historyCount:q("#historyCount"),historyList:q("#historyList"),closeHistoryBtn:q("#closeHistoryBtn"),backupFile:q("#backupFile"),statusBadge:q("#statusBadge"),statKnowledge:q("#statKnowledge"),statTasks:q("#statTasks"),statDueToday:q("#statDueToday"),statNotify:q("#statNotify"),statEngine:q("#statEngine")};
let db,deferredPrompt=null,reminderTimer=null,notifiedTaskIds=new Set();
function q(s){return document.querySelector(s)}
function getSettings(){return{apiUrl:localStorage.getItem("miniai_v7_api_url")||"/api/chat",contextLimit:Number(localStorage.getItem("miniai_v7_context_limit")||5),taskMode:localStorage.getItem("miniai_v7_task_mode")||"assistant",answerEngine:localStorage.getItem("miniai_v7_answer_engine")||"hybrid",briefStyle:localStorage.getItem("miniai_v7_brief_style")||"action",reminderInterval:Number(localStorage.getItem("miniai_v7_reminder_interval")||30)}}

function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VERSION);r.onupgradeneeded=()=>{const d=r.result;if(!d.objectStoreNames.contains(KNOWLEDGE)){const s=d.createObjectStore(KNOWLEDGE,{keyPath:"id",autoIncrement:true});s.createIndex("createdAt","createdAt");s.createIndex("type","type")}if(!d.objectStoreNames.contains(CHATS)){const s=d.createObjectStore(CHATS,{keyPath:"id",autoIncrement:true});s.createIndex("createdAt","createdAt");s.createIndex("taskMode","taskMode")}if(!d.objectStoreNames.contains(TASKS)){const s=d.createObjectStore(TASKS,{keyPath:"id",autoIncrement:true});s.createIndex("createdAt","createdAt");s.createIndex("dueDate","dueDate");s.createIndex("status","status");s.createIndex("priority","priority");s.createIndex("reminderAt","reminderAt")}};r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}

function normalizeTags(tags){if(typeof tags==="string")return tags.split(",").map(t=>t.trim()).filter(Boolean);return Array.isArray(tags)?tags.map(t=>String(t).trim()).filter(Boolean):[]}

function cleanText(t){return String(t||"").replace(/\r\n/g,"\n").replace(/\t/g," ").replace(/[ ]{2,}/g," ").replace(/\n{3,}/g,"\n\n").trim()}
function splitChunks(text,max=800){const c=cleanText(text);if(!c)return[];const ps=c.split(/\n\s*\n/).map(p=>p.trim()).filter(Boolean),out=[];let cur="";for(const p of ps){if((cur+"\n\n"+p).length<=max)cur=cur?cur+"\n\n"+p:p;else{if(cur)out.push(cur);if(p.length<=max)cur=p;else{for(let i=0;i<p.length;i+=max)out.push(p.slice(i,i+max));cur=""}}}if(cur)out.push(cur);return out}
function tokens(t){const l=String(t).toLowerCase().trim(),en=l.match(/[a-zA-Z0-9_]+/g)||[],zh=l.match(/[\u4e00-\u9fff]/g)||[],bi=[];for(let i=0;i<zh.length-1;i++)bi.push(zh[i]+zh[i+1]);return[...en,...zh,...bi]}
function cosine(a,b){const ta=tokens(a),tb=tokens(b);if(!ta.length||!tb.length)return 0;const ca={},cb={};ta.forEach(x=>ca[x]=(ca[x]||0)+1);tb.forEach(x=>cb[x]=(cb[x]||0)+1);const keys=new Set([...Object.keys(ca),...Object.keys(cb)]);let dot=0,na=0,nb=0;keys.forEach(k=>{const va=ca[k]||0,vb=cb[k]||0;dot+=va*vb;na+=va*va;nb+=vb*vb});return dot/(Math.sqrt(na)*Math.sqrt(nb))}
function scoreKnowledge(q,item){const title=item.title||"",body=item.content||"",tags=(item.tags||[]).join(" "),source=item.sourceName||"",all=[title,body,tags,source].join(" ");let s=cosine(q,title)*.55+cosine(q,body)*.30+cosine(q,all)*.15;const x=q.toLowerCase().trim();if(title.toLowerCase().includes(x))s+=.35;if(body.toLowerCase().includes(x))s+=.18;if(tags.toLowerCase().includes(x))s+=.18;if(source.toLowerCase().includes(x))s+=.12;return s}
async function findLocal(q,limit=5){return(await getAll(KNOWLEDGE)).map(item=>({item,score:scoreKnowledge(q,item)})).filter(r=>r.score>0).sort((a,b)=>b.score-a.score).slice(0,limit)}
function excerpt(t,max=520){const c=cleanText(t);return c.length<=max?c:c.slice(0,max).trim()+"…"}
function itemTitle(item){return item.type==="doc_chunk"?`${item.sourceName||item.title||"文件"}${Number.isInteger(item.chunkIndex)?" #"+(item.chunkIndex+1):""}`:item.title||"未命名知識"}
function todayISO(){return new Date().toISOString().slice(0,10)}

function localAnswer(matches){if(!matches.length||matches[0].score<.22)return{answer:"我在本機知識庫裡找不到足夠相關的內容。你可以匯入文件，或新增知識。",sources:[]};const good=matches.filter(m=>m.score>=.22).slice(0,3);return{answer:["我在本機找到這些相關內容：","",...good.map((m,i)=>`${i+1}. ${itemTitle(m.item)}\n${excerpt(m.item.content,380)}`)].join("\n"),sources:good.map(m=>m.item)}}
async function getAssistantSnapshot(){const tasks=await getAll(TASKS),chats=await getAll(CHATS),knowledge=await getAll(KNOWLEDGE),openTasks=tasks.filter(t=>t.status!=="done"),dueToday=openTasks.filter(t=>isDueToday(t.dueDate)),overdue=openTasks.filter(t=>isOverdue(t.dueDate));return{tasks,chats,knowledge,openTasks,dueToday,overdue,recentChats:chats.sort((a,b)=>String(b.createdAt).localeCompare(String(a.createdAt))).slice(0,8)}}
async function callLLM(message,matches,extra={}){const s=getSettings(),context=matches.filter(m=>m.score>=.18).slice(0,s.contextLimit).map(m=>({title:itemTitle(m.item),type:m.item.type,sourceName:m.item.sourceName,content:excerpt(m.item.content,1000),score:m.score}));const r=await fetch(s.apiUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message,context,taskMode:s.taskMode,taskLabel:taskLabels[s.taskMode]||"一般回答",assistantSnapshot:extra.assistantSnapshot||null,briefStyle:s.briefStyle})});if(!r.ok){const text=await r.text();throw new Error(text||"API error")}return await r.json()}
async function reply(input){const text=input.trim();if(!text)return{answer:"你還沒輸入內容。",sources:[]};if(text.startsWith("學習：")||text.startsWith("學習:")){const c=text.replace(/^學習[:：]/,"").trim();if(!c.includes("=>"))return{answer:"格式不對。請用：學習：問題 => 答案",sources:[]};const [question,...parts]=c.split("=>"),answer=parts.join("=>");if(!question.trim()||!answer.trim())return{answer:"問題和答案都不能空白。",sources:[]};await addKnowledge({type:"qa",title:question,content:answer,tags:["使用者新增"]});await refreshStats();return{answer:"我學會了。這筆知識已儲存在本機。",sources:[]}}const s=getSettings(),matches=await findLocal(text,s.contextLimit);if(s.answerEngine==="local")return localAnswer(matches);try{const snapshot=s.taskMode==="assistant"?await getAssistantSnapshot():null;const data=await callLLM(text,matches,{assistantSnapshot:snapshot});return{answer:data.reply||"大型模型沒有回傳文字。",sources:matches.map(m=>m.item).slice(0,s.contextLimit)}}catch(error){const fallback=localAnswer(matches);fallback.answer="大型模型連線失敗，已改用本機回答。\n\n"+fallback.answer+"\n\n錯誤："+error.message;return fallback}}
async function generateDailyBrief(){const snapshot=await getAssistantSnapshot(),openTasks=snapshot.openTasks,due=snapshot.dueToday,over=snapshot.overdue;const local=["每日整理","",`未完成任務：${openTasks.length} 件`,`今日到期：${due.length} 件`,`已逾期：${over.length} 件`,"","今日優先看：",...[...over,...due].slice(0,8).map((t,i)=>`${i+1}. ${t.title}${t.dueDate?`｜${t.dueDate}`:""}｜優先級：${priorityLabels[t.priority]||t.priority}`)].join("\n");if(getSettings().answerEngine==="local")return local;try{const data=await callLLM("請根據我的任務與最近紀錄，產生今日整理。包含今日重點、優先事項、風險與下一步。",[],{assistantSnapshot:snapshot});return data.reply||local}catch(error){return local+"\n\n大型模型連線失敗，以上為本機整理。\n錯誤："+error.message}}

el.importBackupBtn.onclick=()=>el.backupFile.click();el.backupFile.onchange=async()=>{const file=el.backupFile.files[0];if(!file)return;try{const parsed=JSON.parse(await file.text()),knowledge=Array.isArray(parsed)?parsed:(parsed.knowledge||[]),chats=parsed.chats||[],tasks=parsed.tasks||[];let kCount=0,cCount=0,tCount=0;for(const row of knowledge){if(!row.title&&!row.question&&!row.content&&!row.answer)continue;await addKnowledge({type:row.type||(row.content?"doc_chunk":"qa"),title:row.title||row.question||row.sourceName||"",content:row.content||row.answer||"",tags:row.tags||["匯入"],sourceName:row.sourceName||"",chunkIndex:Number.isInteger(row.chunkIndex)?row.chunkIndex:null});kCount++}if(Array.isArray(chats)){for(const chat of chats){if(!chat.userText&&!chat.aiText)continue;await addRecord(CHATS,{userText:chat.userText||"",aiText:chat.aiText||"",taskMode:chat.taskMode||"general",answerEngine:chat.answerEngine||"hybrid",sourceTitles:chat.sourceTitles||[]});cCount++}}if(Array.isArray(tasks)){for(const task of tasks){if(!task.title)continue;await addTask({title:task.title,note:task.note||"",dueDate:task.dueDate||"",reminderAt:task.reminderAt||"",priority:task.priority||"medium",category:task.category||"",status:task.status||"open"});tCount++}}await refreshStats();addMessage("system",`匯入完成：新增 ${kCount} 筆知識、${cCount} 筆聊天、${tCount} 件任務。`)}catch(error){alert("匯入失敗。請確認 JSON 格式。")}finally{el.backupFile.value=""}};
